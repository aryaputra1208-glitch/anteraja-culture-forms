<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rabu Asik & ClubAja — Attendance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F5F5F5;min-height:100vh;padding:24px 16px}
.card{background:#fff;border-radius:12px;border:1px solid #E0E0E0;padding:28px;max-width:600px;margin:0 auto 16px}
.form-header{background:linear-gradient(135deg,#E8197D,#C0146A);border-radius:12px;padding:24px 28px;max-width:600px;margin:0 auto 16px;color:#fff}
.form-header h1{font-size:20px;font-weight:600;margin-bottom:4px}
.form-header p{font-size:13px;opacity:.85;line-height:1.5}
.field{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:500;color:#333;margin-bottom:6px}
label .req{color:#E8197D;margin-left:2px}
select,input[type=text],input[type=date],textarea{width:100%;padding:9px 12px;border:1.5px solid #D0D0D0;border-radius:8px;font-size:14px;color:#222;background:#fff;transition:border .15s;font-family:inherit}
select:focus,input:focus,textarea:focus{outline:none;border-color:#E8197D}
select:disabled{background:#F5F5F5;color:#888;cursor:not-allowed}
.autofill{background:#FDF0F7;border-color:#E8197D;color:#333;font-weight:500}
.hint{font-size:11px;color:#888;margin-top:4px}
.section-label{font-size:11px;font-weight:600;color:#E8197D;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;padding-bottom:6px;border-bottom:1.5px solid #F5D0E8}
.radio-group{display:flex;flex-direction:column;gap:8px}
.radio-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1.5px solid #D0D0D0;border-radius:8px;cursor:pointer;transition:all .15s}
.radio-item:hover{border-color:#E8197D;background:#FDF8FC}
.radio-item input[type=radio]{accent-color:#E8197D;width:16px;height:16px;flex-shrink:0}
.radio-item.selected{border-color:#E8197D;background:#FDF0F7}
.radio-item span{font-size:13px;color:#333}
.submit-btn{width:100%;padding:13px;background:#E8197D;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:8px}
.submit-btn:hover{background:#C0146A}
.submit-btn:disabled{background:#CCC;cursor:not-allowed}
.success-card{display:none;background:#fff;border-radius:12px;border:1.5px solid #3B6D11;padding:28px;max-width:600px;margin:0 auto;text-align:center}
.success-icon{font-size:40px;margin-bottom:12px}
.success-card h2{font-size:18px;color:#3B6D11;margin-bottom:8px}
.success-card p{font-size:13px;color:#555;line-height:1.6}
.reset-btn{margin-top:16px;padding:10px 24px;background:transparent;border:1.5px solid #E8197D;color:#E8197D;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.error-msg{font-size:12px;color:#D32F2F;margin-top:4px;display:none}
.conditional{display:none}
</style>
</head>
<body>
<div class="form-header"><h1>Rabu Asik & ClubAja — Attendance</h1><p>Daftarkan kehadiranmu di program Rabu Asik atau ClubAja</p></div>
<div id="mainForm">

  <div class="card">
    <div class="section-label">Data Karyawan</div>
    <div class="field"><label>Divisi <span class="req">*</span></label>
      <select id="f1_div" onchange="onDivisiChange('f1_div','f1_dept','f1_nama','f1_nip')"></select></div>
    <div class="field"><label>Departemen <span class="req">*</span></label>
      <select id="f1_dept" disabled onchange="onDeptChange('f1_div','f1_dept','f1_nama','f1_nip')">
        <option value="">-- Pilih Divisi dulu --</option></select></div>
    <div class="field"><label>Nama Karyawan <span class="req">*</span></label>
      <select id="f1_nama" disabled onchange="onNamaChange('f1_nama','f1_nip','f1_lvl')">
        <option value="">-- Pilih Departemen dulu --</option></select></div>
    <div class="field"><label>NIP</label>
      <input type="text" id="f1_nip" readonly placeholder="Otomatis terisi">
      <div class="hint">Terisi otomatis setelah pilih nama</div></div>
    <input type="hidden" id="f1_lvl">
  </div>
  <div class="card">
    <div class="section-label">Detail Kehadiran</div>
    <div class="field"><label>Tanggal <span class="req">*</span></label>
      <input type="date" id="f1_tgl">
      <div class="error-msg" id="err_f1_tgl"></div></div>
    <div class="field"><label>Program <span class="req">*</span></label>
      <div class="radio-group">
        <div class="radio-item" data-radio="f1_prog" onclick="selectRadio(this,'f1_prog')"><input type="radio" name="f1_prog" value="Rabu Asik"><span>Rabu Asik</span></div>
        <div class="radio-item" data-radio="f1_prog" onclick="selectRadio(this,'f1_prog')"><input type="radio" name="f1_prog" value="ClubAja"><span>ClubAja</span></div>
      </div>
      <div class="error-msg" id="err_f1_prog"></div></div>
    <div class="field"><label>Nama Sesi / Nama Club <span class="req">*</span></label>
      <input type="text" id="f1_sesi" placeholder="Contoh: Rabu Asik #12 / Club Badminton">
      <div class="error-msg" id="err_f1_sesi"></div></div>
    <div class="field"><label>Peranmu <span class="req">*</span></label>
      <div class="radio-group">
        <div class="radio-item" data-radio="f1_peran" onclick="selectRadio(this,'f1_peran')"><input type="radio" name="f1_peran" value="Panitia"><span>Panitia</span></div>
        <div class="radio-item" data-radio="f1_peran" onclick="selectRadio(this,'f1_peran')"><input type="radio" name="f1_peran" value="Attendee"><span>Attendee</span></div>
      </div>
      <div class="error-msg" id="err_f1_peran"></div></div>
  </div>
  <div class="card"><button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Kirim</button></div>
</div>
<div class="success-card" id="successCard">
  <div class="success-icon">✓</div>
  <h2>Data berhasil dikirim!</h2>
  <p>Terima kasih. Data kamu sudah tercatat.<br>Kamu bisa menutup halaman ini.</p>
  <button class="reset-btn" onclick="resetForm()">Isi lagi</button>
</div>

const API_URL = "https://script.google.com/macros/s/AKfycbxMwstedZatKkQOkUbV0ISd-KIM6U-hyyP1wWUBdEEY3XxSpjOz25jkL6Ld4563f4L7/exec";

function populateDivisi(id){
  const s=document.getElementById(id);
  s.innerHTML='<option value="">-- Pilih Divisi --</option>';
  Object.keys(EMP).sort().forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;s.appendChild(o);});
}
function onDivisiChange(dv,dp,nm,nk){
  const div=document.getElementById(dv).value;
  const ds=document.getElementById(dp),ns=document.getElementById(nm),ne=document.getElementById(nk);
  ds.innerHTML='<option value="">-- Pilih Departemen --</option>';ds.disabled=!div;
  ns.innerHTML='<option value="">-- Pilih Nama --</option>';ns.disabled=true;
  ne.value='';ne.classList.remove('autofill');
  if(!div)return;
  Object.keys(EMP[div]).sort().forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;ds.appendChild(o);});
}
function onDeptChange(dv,dp,nm,nk){
  const div=document.getElementById(dv).value,dept=document.getElementById(dp).value;
  const ns=document.getElementById(nm),ne=document.getElementById(nk);
  ns.innerHTML='<option value="">-- Pilih Nama --</option>';ns.disabled=!dept;
  ne.value='';ne.classList.remove('autofill');
  if(!div||!dept)return;
  (EMP[div][dept]||[]).forEach(e=>{const o=document.createElement('option');o.value=e.nip;o.dataset.nama=e.nama;o.dataset.level=e.level;o.textContent=e.nama+' ('+e.level+')';ns.appendChild(o);});
}
function onNamaChange(nm,nk,lv){
  const s=document.getElementById(nm),opt=s.options[s.selectedIndex],ne=document.getElementById(nk);
  if(s.value&&opt){ne.value=s.value;ne.classList.add('autofill');if(lv){const l=document.getElementById(lv);if(l)l.value=opt.dataset.level||'';}}
  else{ne.value='';ne.classList.remove('autofill');}
}
function selectRadio(el,name){
  document.querySelectorAll('[data-radio="'+name+'"]').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');el.querySelector('input').checked=true;
}
function getRadio(name){const el=document.querySelector('input[name="'+name+'"]:checked');return el?el.value:'';}
function showError(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block';}}
function clearErrors(){document.querySelectorAll('.error-msg').forEach(e=>e.style.display='none');}
async function submitToSheet(tab,data){
  await fetch(API_URL,{
    method:'POST',
    mode:'no-cors',
    body:JSON.stringify({tab,data})
  });
  // no-cors returns opaque response — assume success if no exception
  return {status:'ok'};
}
function init(){populateDivisi('f1_div');}

async function handleSubmit(){
  clearErrors();let v=true;
  if(!document.getElementById('f1_nip').value){showError('err_f1_prog','Pilih nama karyawan');v=false;}
  if(!document.getElementById('f1_tgl').value){showError('err_f1_tgl','Pilih tanggal');v=false;}
  if(!getRadio('f1_prog')){showError('err_f1_prog','Pilih program');v=false;}
  if(!document.getElementById('f1_sesi').value.trim()){showError('err_f1_sesi','Isi nama sesi/club');v=false;}
  if(!getRadio('f1_peran')){showError('err_f1_peran','Pilih peranmu');v=false;}
  if(!v)return;
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Mengirim...';
  const ns=document.getElementById('f1_nama'),opt=ns.options[ns.selectedIndex];
  try{
    await submitToSheet('Attendance_Forms',{
      timestamp:new Date().toISOString(),tanggal:document.getElementById('f1_tgl').value,
      nama:opt.dataset.nama,nip:document.getElementById('f1_nip').value,
      divisi:document.getElementById('f1_div').value,departemen:document.getElementById('f1_dept').value,
      level:document.getElementById('f1_lvl').value,program:getRadio('f1_prog'),
      sesi:document.getElementById('f1_sesi').value.trim(),peran:getRadio('f1_peran')
    });
    document.getElementById('mainForm').style.display='none';
    document.getElementById('successCard').style.display='block';
  }catch(e){alert('Gagal mengirim. Coba lagi.');btn.disabled=false;btn.textContent='Kirim';}
}

function resetForm(){
  document.getElementById('mainForm').style.display='block';
  document.getElementById('successCard').style.display='none';
  document.getElementById('submitBtn').disabled=false;document.getElementById('submitBtn').textContent='Kirim';
  document.getElementById('f1_div').value='';
  onDivisiChange('f1_div','f1_dept','f1_nama','f1_nip');
  document.getElementById('f1_tgl').value='';document.getElementById('f1_sesi').value='';
  document.querySelectorAll('.radio-item').forEach(i=>i.classList.remove('selected'));
  document.querySelectorAll('input[type=radio]').forEach(i=>i.checked=false);
}
window.onload=init;
</script>
